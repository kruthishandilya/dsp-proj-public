services:

  # =========================
  # POSTGRES DATABASE
  # =========================
  db:
    image: postgres:17
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # =========================
  # MODEL API (FASTAPI)
  # =========================
  model_service:
    build:
      context: .
      dockerfile: model_service/Dockerfile
    container_name: model_service
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./model_service/artifacts:/app/model_service/artifacts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # =========================
  # STREAMLIT WEB APP
  # =========================
  webapp:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    container_name: streamlit_app
    depends_on:
      model_service:
        condition: service_healthy
    ports:
      - "8501:8501"
    restart: unless-stopped

  # =========================
  # AIRFLOW (WEBSERVER + SCHEDULER)
  # =========================
  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: airflow_webserver
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      TEAMS_WEBHOOK_URL: ${TEAMS_WEBHOOK_URL:-}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "8081:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/includes:/opt/airflow/includes
      - ./airflow/data:/opt/airflow/data
      - ./scripts:/opt/airflow/scripts
      - ./airflow/entrypoint.sh:/opt/airflow/entrypoint.sh
      - airflow_logs:/opt/airflow/logs
    command: ["bash", "/opt/airflow/entrypoint.sh"]

# =========================
# VOLUMES
# =========================
volumes:
  postgres_data:
  airflow_logs:
